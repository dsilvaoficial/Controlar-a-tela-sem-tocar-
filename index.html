<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok Gesture Smooth</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>
body { margin:0; overflow:hidden; background:black; }

.feed {
  height:100vh;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
}

.video-container {
  height:100vh;
  scroll-snap-align:start;
  position:relative;
}

video {
  width:100%;
  height:100%;
  object-fit:cover;
}

.ui {
  position:absolute;
  right:15px;
  bottom:80px;
  font-size:28px;
  color:white;
}

.camera-box {
  position:fixed;
  top:10px;
  right:10px;
  width:120px;
  border:2px solid white;
  border-radius:10px;
  overflow:hidden;
}

.status {
  position:fixed;
  bottom:20px;
  width:100%;
  text-align:center;
  color:white;
  font-size:20px;
}
</style>
</head>

<body>

<div class="feed" id="feed">

  <div class="video-container">
    <video src="https://www.w3schools.com/html/mov_bbb.mp4" muted loop></video>
    <div class="ui"><div class="like">🤍</div></div>
  </div>

  <div class="video-container">
    <video src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4" muted loop></video>
    <div class="ui"><div class="like">🤍</div></div>
  </div>

</div>

<div class="camera-box">
  <video id="cam" autoplay playsinline></video>
</div>

<div class="status" id="status">Iniciando...</div>

<script>
const feed = document.getElementById("feed");
const statusText = document.getElementById("status");

// 🔥 PEGA SÓ OS VÍDEOS DO FEED
const videos = document.querySelectorAll(".video-container video");

let currentIndex = 0;

// 🎥 controle
function playCurrent(){
  videos.forEach((v,i)=> i===currentIndex?v.play():v.pause());
}

function nextVideo(){
  if(currentIndex >= videos.length-1) return;
  currentIndex++;
  feed.scrollTo({top:currentIndex*innerHeight,behavior:"smooth"});
  playCurrent();
}

function prevVideo(){
  if(currentIndex <= 0) return;
  currentIndex--;
  feed.scrollTo({top:currentIndex*innerHeight,behavior:"smooth"});
  playCurrent();
}

function likeVideo(){
  const likes = document.querySelectorAll(".like");
  if(likes[currentIndex]){
    likes[currentIndex].innerHTML = "❤️";
  }
}

// 👉 dedo
const up = (tip,pip)=> tip.y < pip.y;

// 🔥 gestos
function detectGesture(h){

  const index = up(h[8],h[6]);
  const middle = up(h[12],h[10]);
  const ring = up(h[16],h[14]);
  const pinky = up(h[20],h[18]);

  if(!index && !middle && !ring && !pinky) return "pause";
  if(index && middle && ring && pinky) return "play";
  if(index && middle && !ring && !pinky) return "next";
  if(index && !middle && !ring && !pinky) return "prev";
  if(index && middle && ring && !pinky) return "like";

  return "neutral";
}

// 🔥 anti travamento CORRIGIDO
let lastGesture = "";
let lastProcessTime = 0;
let lastActionTime = 0;

const INTERVAL = 250;
const COOLDOWN = 800;

const hands = new Hands({
  locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/${file}`
});

hands.setOptions({
  maxNumHands:1,
  modelComplexity:0,
  minDetectionConfidence:0.6,
  minTrackingConfidence:0.6
});

hands.onResults(results => {

  const now = Date.now();

  // ⛔ limita processamento
  if(now - lastProcessTime < INTERVAL) return;
  lastProcessTime = now;

  if(!results.multiHandLandmarks){
    statusText.innerHTML = "❌ Sem mão";
    return;
  }

  const gesture = detectGesture(results.multiHandLandmarks[0]);

  // ⛔ cooldown correto
  if(gesture === lastGesture && now - lastActionTime < COOLDOWN){
    return;
  }

  lastGesture = gesture;
  lastActionTime = now;

  switch(gesture){

    case "play":
      videos[currentIndex].play();
      statusText.innerHTML = "▶️ Play";
      break;

    case "pause":
      videos[currentIndex].pause();
      statusText.innerHTML = "⏸️ Pause";
      break;

    case "next":
      nextVideo();
      statusText.innerHTML = "⏭️ Próximo";
      break;

    case "prev":
      prevVideo();
      statusText.innerHTML = "⏮️ Anterior";
      break;

    case "like":
      likeVideo();
      statusText.innerHTML = "❤️ Like";
      break;

    default:
      statusText.innerHTML = "✋ Aguardando";
  }

});

// câmera
const cam = new Camera(document.getElementById("cam"),{
  onFrame: async()=>{ await hands.send({image:cam.video}); },
  width:320,
  height:240
});

cam.start();
playCurrent();
</script>

</body>
</html>
