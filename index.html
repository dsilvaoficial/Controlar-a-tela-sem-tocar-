<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok Gesture PRO+</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>
body { margin:0; overflow:hidden; background:black; }
.feed { height:100vh; overflow-y:scroll; scroll-snap-type:y mandatory; }
.video-container { height:100vh; scroll-snap-align:start; position:relative; }
video { width:100%; height:100%; object-fit:cover; }
.ui { position:absolute; bottom:80px; right:15px; color:white; font-size:24px; }
.camera-box { position:fixed; top:10px; right:10px; width:120px; border:2px solid white; border-radius:10px; overflow:hidden; }
.status { position:fixed; bottom:20px; width:100%; text-align:center; color:white; font-size:20px; }
</style>
</head>

<body>

<div class="feed" id="feed">

  <div class="video-container">
    <video src="https://www.w3schools.com/html/mov_bbb.mp4" muted loop></video>
    <div class="ui"><div class="like">🤍</div></div>
  </div>

  <div class="video-container">
    <video src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4" muted loop></video>
    <div class="ui"><div class="like">🤍</div></div>
  </div>

</div>

<div class="camera-box">
  <video id="cam" autoplay playsinline></video>
</div>

<div class="status" id="status">Iniciando...</div>

<script>
const feed = document.getElementById("feed");
const statusText = document.getElementById("status");
const videos = document.querySelectorAll("video");

let currentIndex = 0;

// 🎥 controle vídeo
function playCurrent(){ videos.forEach((v,i)=> i===currentIndex?v.play():v.pause()); }
function nextVideo(){ currentIndex=Math.min(currentIndex+1,videos.length-1); feed.scrollTo({top:currentIndex*innerHeight,behavior:"smooth"}); playCurrent(); }
function prevVideo(){ currentIndex=Math.max(currentIndex-1,0); feed.scrollTo({top:currentIndex*innerHeight,behavior:"smooth"}); playCurrent(); }
function likeVideo(){ document.querySelectorAll(".like")[currentIndex].innerHTML="❤️"; }

// 👉 detectar dedo
const up = (tip,pip)=> tip.y < pip.y;

// 🔥 NOVA DETECÇÃO
function detectGesture(h){

  const thumb = h[4].x < h[3].x; // polegar lateral
  const index = up(h[8],h[6]);
  const middle = up(h[12],h[10]);
  const ring = up(h[16],h[14]);
  const pinky = up(h[20],h[18]);

  // ✊
  if(!index && !middle && !ring && !pinky) return "pause";

  // 👍
  if(thumb && !index && !middle && !ring && !pinky) return "play";

  // ✌️
  if(index && middle && !ring && !pinky) return "next";

  // ☝️
  if(index && !middle && !ring && !pinky) return "prev";

  // 🤟 (3 dedos)
  if(index && middle && ring && !pinky) return "like";

  // ✋
  if(index && middle && ring && pinky) return "neutral";

  return "unknown";
}

// 🔥 estabilidade
let lastGesture="";
let gestureStart=0;
let lastActionTime=0;

const HOLD=400;
const COOLDOWN=900;

const hands=new Hands({
  locateFile:file=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/${file}`
});

hands.setOptions({
  maxNumHands:1,
  modelComplexity:0,
  minDetectionConfidence:0.6,
  minTrackingConfidence:0.6
});

hands.onResults(results=>{

  if(!results.multiHandLandmarks){
    statusText.innerHTML="❌ Sem mão";
    lastGesture="";
    return;
  }

  const now=Date.now();
  const g=detectGesture(results.multiHandLandmarks[0]);

  if(g!==lastGesture){
    lastGesture=g;
    gestureStart=now;
    return;
  }

  if(now-gestureStart < HOLD) return;
  if(now-lastActionTime < COOLDOWN) return;

  lastActionTime=now;

  switch(g){

    case "pause":
      videos[currentIndex].pause();
      statusText.innerHTML="⏸️ Pause";
      break;

    case "play":
      videos[currentIndex].play();
      statusText.innerHTML="▶️ Play";
      break;

    case "next":
      nextVideo();
      statusText.innerHTML="⏭️ Próximo";
      break;

    case "prev":
      prevVideo();
      statusText.innerHTML="⏮️ Anterior";
      break;

    case "like":
      likeVideo();
      statusText.innerHTML="❤️ Like";
      break;

    case "neutral":
      statusText.innerHTML="✋ Neutro";
      break;

    default:
      statusText.innerHTML="🤔...";
  }

});

// câmera
const cam=new Camera(document.getElementById("cam"),{
  onFrame:async()=>{ await hands.send({image:cam.video}); },
  width:320,
  height:240
});

cam.start();
playCurrent();
</script>

</body>
</html>
