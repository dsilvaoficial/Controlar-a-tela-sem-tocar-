<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok Gesture</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: Arial;
}

.feed {
  height: 100vh;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
}

.video-container {
  height: 100vh;
  position: relative;
  scroll-snap-align: start;
}

video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.ui {
  position: absolute;
  bottom: 80px;
  right: 15px;
  color: white;
  font-size: 22px;
}

.like {
  margin-bottom: 20px;
  cursor: pointer;
}

.camera-box {
  position: fixed;
  top: 10px;
  right: 10px;
  width: 120px;
  border: 2px solid white;
  border-radius: 10px;
  overflow: hidden;
  z-index: 999;
}

.status {
  position: fixed;
  bottom: 20px;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 20px;
}
</style>
</head>

<body>

<div class="feed" id="feed">

  <div class="video-container">
    <video src="https://www.w3schools.com/html/mov_bbb.mp4" autoplay loop muted></video>
    <div class="ui">
      <div class="like">🤍</div>
    </div>
  </div>

  <div class="video-container">
    <video src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4" autoplay loop muted></video>
    <div class="ui">
      <div class="like">🤍</div>
    </div>
  </div>

</div>

<div class="camera-box">
  <video id="cam" autoplay playsinline></video>
</div>

<div class="status" id="status">-</div>

<script>
const feed = document.getElementById("feed");
const statusText = document.getElementById("status");
const videos = document.querySelectorAll("video");

let lastGesture = "";
let gestureTime = 0;
const DELAY = 800; // tempo entre ações

function detectGesture(h) {
  const up = (tip, pip) => tip.y < pip.y;

  const index = up(h[8], h[6]);
  const middle = up(h[12], h[10]);
  const ring = up(h[16], h[14]);
  const pinky = up(h[20], h[18]);

  // ✊ fechado
  if (!index && !middle && !ring && !pinky) return "fist";

  // ✌️ dois dedos
  if (index && middle && !ring && !pinky) return "peace";

  // ☝️ um dedo
  if (index && !middle && !ring && !pinky) return "one";

  // 🖐️ aberto
  if (index && middle && ring && pinky) return "open";

  return "unknown";
}

hands.onResults(results => {
  if (!results.multiHandLandmarks) {
    statusText.innerHTML = "❌ sem mão";
    lastGesture = "";
    return;
  }

  const now = Date.now();
  const hand = results.multiHandLandmarks[0];

  const gesture = detectGesture(hand);

  // ⛔ evita repetir ação rápido
  if (gesture === lastGesture && now - gestureTime < DELAY) {
    return;
  }

  gestureTime = now;
  lastGesture = gesture;

  switch (gesture) {

    case "fist":
      const v = videos[currentIndex];
      if (v.paused) {
        v.play();
        statusText.innerHTML = "▶️ Play";
      } else {
        v.pause();
        statusText.innerHTML = "⏸️ Pause";
      }
      break;

    case "peace":
      nextVideo();
      statusText.innerHTML = "⏭️ Próximo";
      break;

    case "one":
      prevVideo();
      statusText.innerHTML = "⏮️ Anterior";
      break;

    case "open":
      statusText.innerHTML = "✋ neutro";
      break;

    default:
      statusText.innerHTML = "🤔...";
  }
});

// câmera
const cam = new Camera(document.getElementById("cam"), {
  onFrame: async () => {
    await hands.send({ image: cam.video });
  },
  width: 320,
  height: 240
});

cam.start();

// autoplay inicial
playCurrent();
</script>

</body>
  </html>
