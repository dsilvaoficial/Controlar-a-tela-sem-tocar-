<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok Gesture PRO</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: Arial;
}

.feed {
  height: 100vh;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
}

.video-container {
  height: 100vh;
  position: relative;
  scroll-snap-align: start;
}

video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.ui {
  position: absolute;
  bottom: 80px;
  right: 15px;
  color: white;
  font-size: 24px;
}

.like {
  margin-bottom: 20px;
}

.camera-box {
  position: fixed;
  top: 10px;
  right: 10px;
  width: 120px;
  border: 2px solid white;
  border-radius: 10px;
  overflow: hidden;
  z-index: 999;
}

.status {
  position: fixed;
  bottom: 20px;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 20px;
}
</style>
</head>

<body>

<div class="feed" id="feed">

  <div class="video-container">
    <video src="https://www.w3schools.com/html/mov_bbb.mp4" muted loop></video>
    <div class="ui"><div class="like">🤍</div></div>
  </div>

  <div class="video-container">
    <video src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4" muted loop></video>
    <div class="ui"><div class="like">🤍</div></div>
  </div>

</div>

<div class="camera-box">
  <video id="cam" autoplay playsinline></video>
</div>

<div class="status" id="status">Iniciando...</div>

<script>
const feed = document.getElementById("feed");
const statusText = document.getElementById("status");
const videos = document.querySelectorAll(".video-container video");

let currentIndex = 0;

// 👉 controle de reprodução
function playCurrent() {
  videos.forEach((v, i) => {
    if (i === currentIndex) v.play();
    else v.pause();
  });
}

// 👉 próximo vídeo
function nextVideo() {
  currentIndex = Math.min(currentIndex + 1, videos.length - 1);
  feed.scrollTo({ top: currentIndex * window.innerHeight, behavior: "smooth" });
  playCurrent();
}

// 👉 vídeo anterior
function prevVideo() {
  currentIndex = Math.max(currentIndex - 1, 0);
  feed.scrollTo({ top: currentIndex * window.innerHeight, behavior: "smooth" });
  playCurrent();
}

// 👉 like
function likeVideo() {
  const like = document.querySelectorAll(".like")[currentIndex];
  like.innerHTML = "❤️";
}

// 🔥 DETECÇÃO MELHORADA
function isUp(tip, pip) {
  return tip.y < pip.y;
}

function detectGesture(h) {
  const index = isUp(h[8], h[6]);
  const middle = isUp(h[12], h[10]);
  const ring = isUp(h[16], h[14]);
  const pinky = isUp(h[20], h[18]);

  if (!index && !middle && !ring && !pinky) return "fist";   // ✊
  if (index && middle && !ring && !pinky) return "peace";    // ✌️
  if (index && !middle && !ring && !pinky) return "one";     // ☝️
  if (index && middle && ring && pinky) return "open";       // ✋

  return "unknown";
}

// 🔥 CONTROLE DE ESTABILIDADE
let lastGesture = "";
let gestureStart = 0;
const HOLD_TIME = 400; // tempo para validar gesto
const COOLDOWN = 800;  // tempo entre ações

let lastActionTime = 0;

const hands = new Hands({
  locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/${file}`
});

hands.setOptions({
  maxNumHands: 1,
  modelComplexity: 0,
  minDetectionConfidence: 0.6,
  minTrackingConfidence: 0.6
});

hands.onResults(results => {
  if (!results.multiHandLandmarks) {
    statusText.innerHTML = "❌ Sem mão";
    lastGesture = "";
    return;
  }

  const now = Date.now();
  const hand = results.multiHandLandmarks[0];
  const gesture = detectGesture(hand);

  // 👉 estabilidade do gesto
  if (gesture !== lastGesture) {
    lastGesture = gesture;
    gestureStart = now;
    return;
  }

  // 👉 precisa segurar o gesto
  if (now - gestureStart < HOLD_TIME) return;

  // 👉 cooldown
  if (now - lastActionTime < COOLDOWN) return;

  lastActionTime = now;

  switch (gesture) {

    case "fist":
      const v = videos[currentIndex];
      if (v.paused) {
        v.play();
        statusText.innerHTML = "▶️ Play";
      } else {
        v.pause();
        statusText.innerHTML = "⏸️ Pause";
      }
      break;

    case "peace":
      nextVideo();
      statusText.innerHTML = "⏭️ Próximo";
      break;

    case "one":
      prevVideo();
      statusText.innerHTML = "⏮️ Anterior";
      break;

    case "open":
      likeVideo();
      statusText.innerHTML = "❤️ Like";
      break;

    default:
      statusText.innerHTML = "🤔...";
  }
});

// câmera
const cam = new Camera(document.getElementById("cam"), {
  onFrame: async () => {
    await hands.send({ image: cam.video });
  },
  width: 320,
  height: 240
});

cam.start();

// autoplay inicial
playCurrent();
</script>

</body>
</html>
